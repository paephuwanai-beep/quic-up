<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUIC up KHONSAN</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, .font-sans { font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif !important; }
        .font-sarabun { font-family: 'Sarabun', sans-serif !important; }

        @media print {
            @page { size: A5 landscape; margin: 0; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            .glass-panel { background: white !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; }
        }
        .html2pdf__page-break { page-break-after: always; height: 0; border: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
            outline: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* --- Custom Animations for Guidelines --- */
        @keyframes anim-dog {
          0%, 100% { transform: scale(1) rotate(0deg); }
          50% { transform: scale(1.05) rotate(-5deg); }
        }
        @keyframes anim-hand {
          0%, 100% { transform: translateY(0) rotate(-15deg); }
          50% { transform: translateY(8px) rotate(0deg); }
        }
        @keyframes anim-scratch {
          0% { transform: scaleY(0); opacity: 0; }
          20% { transform: scaleY(1); opacity: 1; }
          80% { transform: scaleY(1); opacity: 1; }
          100% { transform: scaleY(1); opacity: 0; }
        }
        @keyframes anim-bleed-pulse {
          0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px rgba(220,38,38,0.5); }
          50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px rgba(220,38,38,0.9); }
        }
        @keyframes anim-blood-drop {
          0% { transform: translateY(-5px) scale(0.5); opacity: 0; }
          20% { transform: translateY(0) scale(1); opacity: 1; }
          80% { transform: translateY(35px) scale(0.8); opacity: 1; }
          100% { transform: translateY(45px) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- React App Script -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icon Component Mappers (Using FontAwesome) ---
        const FAIcon = ({ icon, className }) => {
            let sizeClass = '';
            if (className?.includes('w-4') || className?.includes('h-4')) sizeClass = 'text-sm ';
            if (className?.includes('w-5') || className?.includes('h-5')) sizeClass = 'text-base ';
            if (className?.includes('w-6') || className?.includes('h-6')) sizeClass = 'text-xl ';
            if (className?.includes('w-7') || className?.includes('h-7')) sizeClass = 'text-2xl ';
            if (className?.includes('w-8') || className?.includes('h-8')) sizeClass = 'text-3xl ';
            
            return <i className={`fa-solid ${icon} ${sizeClass} ${className || ''} flex items-center justify-center`}></i>;
        };

        const Syringe = (p) => <FAIcon icon="fa-syringe" {...p} />;
        const Bandage = (p) => <FAIcon icon="fa-band-aid" {...p} />;
        const Stethoscope = (p) => <FAIcon icon="fa-stethoscope" {...p} />;
        const Printer = (p) => <FAIcon icon="fa-print" {...p} />;
        const BookOpen = (p) => <FAIcon icon="fa-book-open" {...p} />;
        const Calculator = (p) => <FAIcon icon="fa-calculator" {...p} />;
        const Info = (p) => <FAIcon icon="fa-circle-info" {...p} />;
        const CalendarDays = (p) => <FAIcon icon="fa-calendar-days" {...p} />;
        const User = (p) => <FAIcon icon="fa-user" {...p} />;
        const AlertCircle = (p) => <FAIcon icon="fa-circle-exclamation" {...p} />;
        const Dog = (p) => <FAIcon icon="fa-dog" {...p} />;
        const Download = (p) => <FAIcon icon="fa-download" {...p} />;
        const CopyPlus = (p) => <FAIcon icon="fa-copy" {...p} />;
        const Hand = (p) => <FAIcon icon="fa-hand" {...p} />;
        const Droplet = (p) => <FAIcon icon="fa-droplet" {...p} />;
        const HandHeart = (p) => <FAIcon icon="fa-hand-holding-heart" {...p} />;
        const ShieldCheck = (p) => <FAIcon icon="fa-shield-halved" {...p} />;
        const Activity = (p) => <FAIcon icon="fa-chart-line" {...p} />;
        const Baby = (p) => <FAIcon icon="fa-baby" {...p} />;
        const HeartPulse = (p) => <FAIcon icon="fa-heart-pulse" {...p} />;
        const AlertTriangle = (p) => <FAIcon icon="fa-triangle-exclamation" {...p} />;
        const Lightbulb = (p) => <FAIcon icon="fa-lightbulb" {...p} />;

        // --- Reference Section Component ---
        const ReferenceSection = ({ activeTab }) => {
          let refs = [];
          if (activeTab === 'rabies') {
            refs = [
              'แนวทางการดูแลรักษาผู้ป่วยสัมผัสโรคพิษสุนัขบ้า สถานเสาวภา สภากาชาดไทย (พ.ศ. 2561)',
              'แผนงานสร้างเสริมภูมิคุ้มกันโรค กรมควบคุมโรค กระทรวงสาธารณสุข',
              'The Sanford Guide to Antimicrobial Therapy (อ้างอิงสำหรับการเลือกใช้ยาปฏิชีวนะในแผลสัตว์กัด)'
            ];
          } else if (activeTab === 'tetanus') {
            refs = [
              'แนวทางการให้วัคซีนบาดทะยัก (Tetanus prophylaxis in wound management) สำหรับผู้ป่วยที่มีบาดแผล',
              'คู่มือสร้างเสริมภูมิคุ้มกันโรค กรมควบคุมโรค กระทรวงสาธารณสุข'
            ];
          } else if (activeTab === 'hbv') {
            refs = [
              'แนวทางการให้วัคซีนตับอักเสบบี กรมควบคุมโรค กระทรวงสาธารณสุข',
              'ตารางการให้วัคซีน แนะนำโดยสมาคมโรคติดเชื้อในเด็กแห่งประเทศไทย (PIDST)'
            ];
          } else if (activeTab === 'pediatric') {
            refs = [
              'ตารางการให้วัคซีนในเด็กไทย แนะนำโดยสมาคมโรคติดเชื้อในเด็กแห่งประเทศไทย (PIDST) ปีล่าสุด (2566/2567)',
              'แผนงานสร้างเสริมภูมิคุ้มกันโรค กรมควบคุมโรค กระทรวงสาธารณสุข (EPI)'
            ];
          }

          return (
            <div className="bg-white/80 border border-blue-200 p-5 rounded-3xl text-sm text-gray-600 shadow-sm mt-8 animate-fade-in no-print">
              <h4 className="font-bold text-gray-800 mb-3 border-b border-gray-200 pb-2 flex items-center gap-2">
                <Info className="w-5 h-5 text-blue-500" /> ที่มาและแหล่งอ้างอิง (References)
              </h4>
              <ul className="list-disc pl-5 space-y-2">
                {refs.map((ref, idx) => (
                  <li key={idx} className="text-gray-700 leading-relaxed">{ref}</li>
                ))}
              </ul>
            </div>
          );
        };

        // --- Vaccine Tooltip Helper ---
        const getVaccineInfo = (vaccineName) => {
          if (vaccineName.includes('BCG')) return { se: 'อาจมีตุ่มหนองเกิดขึ้นบริเวณที่ฉีดใน 2-4 สัปดาห์', advice: 'ห้ามบีบ เจาะ หรือทายาบริเวณตุ่มหนอง ให้ซับด้วยสำลีสะอาดเวลาอาบน้ำ' };
          if (vaccineName.includes('HBV')) return { se: 'อาจมีอาการปวด บวม แดง บริเวณที่ฉีด หรือไข้ต่ำๆ', advice: 'ประคบเย็นบริเวณที่ฉีด หากมีไข้ให้รับประทานยาลดไข้' };
          if (vaccineName.includes('DTP')) return { se: 'มักมีไข้ (อาจสูง) ร้องกวน ปวดบวมแดงบริเวณที่ฉีด', advice: 'เช็ดตัวลดไข้ รับประทานยาลดไข้ทุก 4-6 ชม. ประคบเย็นบริเวณที่บวม' };
          if (vaccineName.includes('OPV')) return { se: 'แทบไม่มีอาการข้างเคียงที่พบได้บ่อย', advice: 'งดดื่มนม/น้ำร้อน หรืออาหารร้อน 30 นาทีหลังหยอดวัคซีน' };
          if (vaccineName.includes('IPV')) return { se: 'อาจมีอาการปวด บวม แดง บริเวณที่ฉีด หรือไข้ต่ำๆ', advice: 'ประคบเย็นบริเวณที่ฉีด รับประทานยาลดไข้เมื่อมีอาการ' };
          if (vaccineName.includes('Rota')) return { se: 'อาจมีไข้ต่ำๆ ถ่ายเหลว หรืออาเจียนเล็กน้อย', advice: 'ดูแลให้ดื่มน้ำ/นมให้เพียงพอ ล้างมือให้สะอาดหลังเปลี่ยนผ้าอ้อมเด็ก' };
          if (vaccineName.includes('MMR')) return { se: 'อาจมีไข้ต่ำๆ หรือมีผื่นจางๆ คล้ายหัดขึ้นหลังฉีด 5-12 วัน', advice: 'รับประทานยาลดไข้ อาการจะหายไปเองใน 2-3 วัน' };
          if (vaccineName.includes('LAJE')) return { se: 'อาจมีอาการปวด บวม แดง บริเวณที่ฉีด หรือไข้ต่ำๆ', advice: 'ประคบเย็นบริเวณที่ฉีด รับประทานยาลดไข้' };
          if (vaccineName.includes('VZV')) return { se: 'อาจมีไข้ หรือมีตุ่มน้ำใส 2-3 ตุ่มบริเวณที่ฉีด (พบไม่บ่อย)', advice: 'รับประทานยาลดไข้ ห้ามแกะเกาตุ่มน้ำ' };
          if (vaccineName.includes('HepA')) return { se: 'ปวด บวม แดงบริเวณที่ฉีด ไข้ต่ำๆ', advice: 'ประคบเย็นบริเวณที่ฉีด รับประทานยาลดไข้' };
          if (vaccineName.includes('HPV')) return { se: 'ปวด บวม แดงบริเวณที่ฉีด อาจมีอาการวิงเวียน/หน้ามืด', advice: 'ให้นั่งพัก 15 นาทีหลังฉีด ประคบเย็นบริเวณที่ฉีด' };
          if (vaccineName.includes('Tdap') || vaccineName.includes('dT')) return { se: 'ปวด บวม แดงบริเวณที่ฉีด ปวดเมื่อยกล้ามเนื้อ ไข้ต่ำ', advice: 'ประคบเย็นบริเวณที่ฉีด รับประทานยาลดไข้' };
          return { se: 'อาจมีอาการปวด บวม แดง บริเวณที่ฉีด หรือไข้ต่ำๆ', advice: 'ประคบเย็นบริเวณที่ฉีด รับประทานยาลดไข้เมื่อมีไข้' };
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('rabies');
          
          // --- Common State ---
          const [patientInfo, setPatientInfo] = useState({
            hn: '', an: '', fullName: '', 
            diagnosis: '', allergy: '', doctorName: '', issuerName: '', dayZero: new Date().toISOString().split('T')[0]
          });

          const [printBoth, setPrintBoth] = useState(false);

          useEffect(() => {
            const savedDx = localStorage.getItem('quicup_dx') || '';
            const savedDoctor = localStorage.getItem('quicup_doctor') || '';
            const savedIssuer = localStorage.getItem('quicup_issuer') || '';
            setPatientInfo(prev => ({
              ...prev,
              diagnosis: savedDx,
              doctorName: savedDoctor,
              issuerName: savedIssuer
            }));
          }, []);

          const [woundCare, setWoundCare] = useState({
            include: false,
            timesPerDay: '1',
            removeSutureDate: '',
            woundCheckDate: '',
            location: 'รพ.สต.ใกล้บ้าน',
            otherLocation: ''
          });

          // --- Rabies State ---
          const [rvHistory, setRvHistory] = useState('none'); 
          const [erigWeight, setErigWeight] = useState('');

          // --- Tetanus State ---
          const [dtHistory, setDtHistory] = useState('unknown'); 
          const [woundType, setWoundType] = useState('clean'); 

          // --- HBV State ---
          const [hbvHistory, setHbvHistory] = useState('new'); 

          // --- ATB Calculator State ---
          const [weight, setWeight] = useState('');
          const [drugChoice, setDrugChoice] = useState('amox_clav'); 
          const [atbResult, setAtbResult] = useState(null);

          // --- Pediatric Vaccine State ---
          const [childYears, setChildYears] = useState('');
          const [childMonths, setChildMonths] = useState('');
          const [pediatricResult, setPediatricResult] = useState(null);

          // --- ERIG Calculator Logic ---
          const calculateErig = (weight) => {
            const w = parseFloat(weight);
            if (isNaN(w) || w <= 0) return null;
            let iu = w * 40; 
            let isMax = false;
            if (iu >= 3000) {
              iu = 3000; 
              isMax = true;
            }
            const ml = iu / 200; 
            return { iu: Math.round(iu), ml: ml.toFixed(1), isMax };
          };
          const erigData = calculateErig(erigWeight);

          const [isDownloading, setIsDownloading] = useState(false);

          useEffect(() => {
            const scriptId = 'html2pdf-script';
            if (!document.getElementById(scriptId)) {
              const script = document.createElement('script');
              script.id = scriptId;
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
              script.async = true;
              document.body.appendChild(script);
            }
          }, []);

          const handlePatientChange = (e) => {
            const { name, value } = e.target;
            setPatientInfo({...patientInfo, [name]: value});
            
            if (name === 'diagnosis') localStorage.setItem('quicup_dx', value);
            if (name === 'doctorName') localStorage.setItem('quicup_doctor', value);
            if (name === 'issuerName') localStorage.setItem('quicup_issuer', value);
          };

          const handleWoundCareChange = (e) => {
            const value = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
            setWoundCare({...woundCare, [e.target.name]: value});
          };

          const addDays = (dateString, days) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            date.setDate(date.getDate() + days);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
          };

          const addMonths = (dateString, months) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            date.setMonth(date.getMonth() + months);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
          };

          const formatDate = (dateString) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
          };

          const generateRVSchedule = () => {
            const d0 = patientInfo.dayZero;
            let schedule = [];
            let instructions = '';

            if (rvHistory === 'none') {
              instructions = 'ฉีด 0.1 ml เข้าในหนัง (ID) x 2 จุด (แขนซ้ายและขวา)';
              schedule = [
                { day: 'Day 0', date: addDays(d0, 0), note: 'ฉีดวันนี้' },
                { day: 'Day 3', date: addDays(d0, 3), note: '' },
                { day: 'Day 7', date: addDays(d0, 7), note: '' },
                { day: 'Day 28', date: addDays(d0, 28), note: '' }
              ];
            } else if (rvHistory === 'less6m') {
              instructions = 'ฉีดกระตุ้น 0.1 ml เข้าในหนัง (ID) x 1 จุด';
              schedule = [{ day: 'Day 0', date: addDays(d0, 0), note: 'Booster 1 เข็ม' }];
            } else if (rvHistory === 'more6m') {
              instructions = 'ฉีดกระตุ้น 0.1 ml เข้าในหนัง (ID) x 1 จุด (ฉีด 2 วัน)';
              schedule = [
                { day: 'Day 0', date: addDays(d0, 0), note: 'Booster' },
                { day: 'Day 3', date: addDays(d0, 3), note: 'Booster' }
              ];
            }
            return { schedule, instructions };
          };

          const generateDTSchedule = () => {
            const d0 = patientInfo.dayZero;
            let schedule = [];
            let instructions = '';

            if (dtHistory === 'unknown') {
               instructions = `ฉีด 0.5 ml เข้ากล้ามเนื้อ (IM) ${woundType === 'dirty' ? '+ พิจารณา TIG' : ''}`;
               schedule = [
                { day: 'เข็มที่ 1', date: addDays(d0, 0), note: woundType === 'dirty' ? '+ TIG' : '' },
                { day: 'เข็มที่ 2', date: addMonths(d0, 1), note: 'ห่างเข็มแรก 1 ด.' },
                { day: 'เข็มที่ 3', date: addMonths(d0, 7), note: 'ห่างเข็มสอง 6 ด.' }
              ];
            } else if (dtHistory === 'complete_more10' || (dtHistory === 'complete_more5_less10' && woundType === 'dirty')) {
              instructions = 'ฉีดกระตุ้น 0.5 ml เข้ากล้ามเนื้อ (IM) x 1 เข็ม';
              schedule = [{ day: 'กระตุ้น 1 เข็ม', date: addDays(d0, 0), note: 'วันนี้' }];
            } else {
               instructions = 'ไม่ต้องฉีดวัคซีนกระตุ้น (ภูมิคุ้มกันยังเพียงพอ)';
               schedule = [{ day: '-', date: '-', note: 'ไม่ต้องฉีด' }];
            }
            return { schedule, instructions };
          };

          const generateHBVSchedule = () => {
            const d0 = patientInfo.dayZero;
            let schedule = [];
            let instructions = 'ฉีด 1.0 ml (ผู้ใหญ่) หรือ 0.5 ml (เด็ก) เข้ากล้ามเนื้อ (IM) บริเวณต้นแขน (Deltoid)';

            if (hbvHistory === 'new') {
              schedule = [
                { day: 'เข็มที่ 1 (0)', date: addDays(d0, 0), note: 'ฉีดวันนี้' },
                { day: 'เข็มที่ 2 (1 เดือน)', date: addMonths(d0, 1), note: 'ห่างเข็มแรก 1 ด.' },
                { day: 'เข็มที่ 3 (6 เดือน)', date: addMonths(d0, 6), note: 'ห่างเข็มแรก 6 ด.' }
              ];
            } else if (hbvHistory === 'booster') {
              schedule = [{ day: 'กระตุ้น 1 เข็ม', date: addDays(d0, 0), note: 'ฉีดวันนี้' }];
            } else if (hbvHistory === 'dose2') {
              schedule = [
                { day: 'เข็มที่ 2', date: addDays(d0, 0), note: 'ฉีดวันนี้' },
                { day: 'เข็มที่ 3', date: addMonths(d0, 5), note: 'ห่างเข็ม 2 อีก 5 ด.' }
              ];
            }
            return { schedule, instructions };
          };

          const calculateATB = () => {
            const w = parseFloat(weight);
            if (isNaN(w) || w <= 0) { setAtbResult(null); return; }

            if (drugChoice === 'amox_clav') {
              if (w < 40) {
                const mgPerDose = (w * 40) / 2;
                setAtbResult({
                  type: 'pediatric', drug: 'Amoxicillin/Clavulanate (228.5 mg/5ml) Dry Syrup',
                  dose: `${((mgPerDose * 5) / 200).toFixed(1)} ml`,
                  frequency: 'กินครั้งละ 1 โดส วันละ 2 ครั้ง (เช้า-เย็น) หลังอาหาร', duration: 'ระยะเวลา 5 - 7 วัน',
                  calcNote: `คำนวณจาก Amoxicillin 40 mg/kg/day = ${mgPerDose.toFixed(0)} mg / dose`
                });
              } else {
                setAtbResult({
                  type: 'adult', drug: 'Amoxicillin/Clavulanate (875/125 mg) Tablet',

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                              {/* Cat I */}
                              <div className="bg-gradient-to-b from-green-50 to-green-100/50 p-5 rounded-3xl border border-green-200 shadow-sm flex flex-col items-center text-center">
                                <div className="relative w-full h-32 bg-green-50/50 rounded-2xl border-2 border-dashed border-green-300 flex items-center justify-center mb-4 overflow-hidden shadow-inner group">
                                  <div className="relative w-32 h-full flex items-center justify-center">
                                      <div className="absolute bottom-4 left-2" style={ { animation: 'anim-dog 2s ease-in-out infinite' } }>
                                          <i className="fa-solid fa-dog text-[50px] text-green-500 drop-shadow-md"></i>
                                      </div>
                                      <div className="absolute top-2 right-0 origin-bottom-right" style={ { animation: 'anim-hand 2s ease-in-out infinite' } }>
                                          <i className="fa-solid fa-hand text-[45px] text-green-600 drop-shadow-lg rotate-[-15deg]"></i>
                                      </div>
                                      <i className="fa-solid fa-heart text-pink-400 absolute top-4 left-8 text-xl animate-pulse opacity-70"></i>
                                  </div>
                                </div>
                                <div className="text-green-800 font-black text-xl mb-2 flex items-center gap-2">
                                  <span className="bg-green-600 text-white px-3 py-1 rounded-xl text-sm shadow-md">Cat I</span> สัมผัสทั่วไป
                                </div>
                                <p className="text-sm text-gray-700 mb-4 h-16 flex items-center justify-center">
                                  ถูกสัตว์เลียผิวหนังที่ไม่มีแผล, ให้อาหาร, สัมผัสตัวสัตว์
                                </p>
                                <div className="bg-white w-full p-4 rounded-2xl text-sm border-l-4 border-green-500 shadow-sm text-left mt-auto">
                                  <strong className="text-gray-800 block mb-1">การรักษา:</strong>
                                  <span className="text-gray-600">- ล้างด้วยน้ำและสบู่</span><br/>
                                  <span className="text-red-500 font-bold mt-1 inline-block bg-red-50 px-2 py-1 rounded">- ไม่ต้องฉีดวัคซีน (No PEP)</span>
                                </div>
                              </div>

                              {/* Cat II */}
                              <div className="bg-gradient-to-b from-yellow-50 to-yellow-100/50 p-5 rounded-3xl border border-yellow-200 shadow-sm flex flex-col items-center text-center">
                                <div className="relative w-full h-32 bg-yellow-50/50 rounded-2xl border-2 border-dashed border-yellow-300 flex items-center justify-center mb-4 overflow-hidden shadow-inner group">
                                  <div className="relative w-24 h-24 flex items-center justify-center">
                                      <i className="fa-solid fa-hand text-[70px] text-yellow-500/30"></i>
                                      <div className="absolute inset-0 flex items-center justify-center gap-[6px] rotate-[20deg] mix-blend-multiply">
                                          <div className="w-[5px] h-12 bg-red-400 rounded-full origin-top" style={ { animation: 'anim-scratch 2s ease-out infinite' } }></div>
                                          <div className="w-[6px] h-16 bg-red-400 rounded-full origin-top mt-4" style={ { animation: 'anim-scratch 2s ease-out 0.2s infinite' } }></div>
                                          <div className="w-[5px] h-10 bg-red-400 rounded-full origin-top mt-2" style={ { animation: 'anim-scratch 2s ease-out 0.4s infinite' } }></div>
                                      </div>
                                  </div>
                                </div>
                                <div className="text-yellow-800 font-black text-xl mb-2 flex items-center gap-2">
                                  <span className="bg-yellow-500 text-white px-3 py-1 rounded-xl text-sm shadow-md">Cat II</span> มีรอยถลอก
                                </div>
                                <p className="text-sm text-gray-700 mb-4 h-16 flex items-center justify-center">
                                  ถูกกัด ข่วน เป็นรอยช้ำ หรือถลอก <span className="underline ml-1 font-semibold text-gray-900">ไม่มีเลือดออก</span>
                                </p>
                                <div className="bg-white w-full p-4 rounded-2xl text-sm border-l-4 border-yellow-500 shadow-sm text-left mt-auto">
                                  <strong className="text-gray-800 block mb-1">การรักษา:</strong>
                                  <span className="text-gray-600">- ล้างแผลใส่ยาฆ่าเชื้อ</span><br/>
                                  <span className="text-blue-600 font-bold mt-1 inline-block bg-blue-50 px-2 py-1 rounded">- ฉีดวัคซีน Rabies</span>
                                </div>
                              </div>

                              {/* Cat III */}
                              <div className="bg-gradient-to-b from-red-50 to-red-100/50 p-5 rounded-3xl border border-red-200 shadow-sm flex flex-col items-center text-center">
                                <div className="relative w-full h-32 bg-red-50/50 rounded-2xl border-2 border-dashed border-red-300 flex items-center justify-center mb-4 overflow-hidden shadow-inner group">
                                  <div className="relative w-24 h-24 flex items-center justify-center">
                                      <i className="fa-solid fa-hand text-[70px] text-red-300/40"></i>
                                      <div className="absolute top-[40%] left-[45%] transform -translate-x-1/2 w-10 h-[6px] bg-red-700 rounded-full rotate-[20deg]" style={ { animation: 'anim-bleed-pulse 1.5s infinite' } }></div>
                                      <div className="absolute top-[42%] left-[45%]">
                                          <i className="fa-solid fa-droplet text-red-600 text-xl" style={ { animation: 'anim-blood-drop 1.5s ease-in infinite' } }></i>
                                      </div>
                                      <div className="absolute top-[40%] left-[55%]">
                                          <i className="fa-solid fa-droplet text-red-700 text-sm" style={ { animation: 'anim-blood-drop 1.5s ease-in 0.6s infinite' } }></i>
                                      </div>
                                  </div>
                                </div>
                                <div className="text-red-800 font-black text-xl mb-2 flex items-center gap-2">
                                  <span className="bg-red-600 text-white px-3 py-1 rounded-xl text-sm shadow-md">Cat III</span> แผลลึก เลือดออก
                                </div>
                                <p className="text-sm text-gray-700 mb-4 h-16 flex items-center justify-center leading-relaxed">
                                  กัด ข่วน <span className="underline mx-1 font-semibold text-gray-900">มีเลือดออก</span> (แม้เพียงหยดเดียว), น้ำลายโดนเยื่อบุตา/ปาก
                                </p>
                                <div className="bg-white w-full p-4 rounded-2xl text-sm border-l-4 border-red-500 shadow-sm text-left mt-auto">
                                  <strong className="text-gray-800 block mb-1">การรักษา:</strong>
                                  <span className="text-gray-600">- ล้างแผลใส่ยาฆ่าเชื้อ</span><br/>
                                  <span className="text-blue-600 font-bold">- ฉีดวัคซีน Rabies</span><br/>
                                  <span className="text-purple-700 font-bold mt-1 inline-block bg-purple-50 px-2 py-1 rounded">- ฉีด RIG (เซรุ่ม) รอบแผล</span>
                                </div>
                              </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl border border-blue-100 shadow-sm">
                              <h2 className="text-xl font-bold text-blue-800 mb-4 flex items-center gap-2">
                                <Calculator className="w-6 h-6" /> ATB Dosage Calculator (Dog/Cat Bite)
                              </h2>
                              <p className="text-sm text-gray-600 mb-4">
                                ยา <strong>First-line</strong> สำหรับแผลสัตว์กัดคือ <strong>Amoxicillin/Clavulanate</strong> <br/>(หากแพ้ Penicillin สามารถเลือกระบุยาทางเลือกอื่นที่เหมาะสมได้)
                              </p>
                              
                              <div className="flex flex-col md:flex-row gap-4 items-end mb-6">
                                <div className="w-full md:w-1/3">
                                  <label className="block text-sm font-medium text-gray-700 mb-1">น้ำหนักผู้ป่วย (kg)</label>
                                  <input 
                                    type="number" 
                                    value={weight} 
                                    onChange={(e) => setWeight(e.target.value)} 
                                    placeholder="กรอกน้ำหนัก" 
                                    className="glass-input w-full p-3 rounded-xl text-lg font-bold text-center"
                                  />
                                </div>
                                <div className="w-full md:w-1/2">
                                  <label className="block text-sm font-medium text-gray-700 mb-1">เลือกชนิดยา ATB</label>
                                  <select 
                                    value={drugChoice} 
                                    onChange={(e) => setDrugChoice(e.target.value)} 
                                    className="glass-input w-full p-3 rounded-xl text-md font-bold"
                                  >
                                    <option value="amox_clav">Amoxicillin/Clavulanate (First-line)</option>
                                    <option value="amox">Amoxicillin (ระวังเชื้อดื้อยา)</option>
                                    <option value="clinda">Clindamycin (ต้องใช้คู่กับยาอื่น)</option>
                                    <option value="tmp_smx">TMP-SMX / Bactrim (ทางเลือกเด็กแพ้ PCN)</option>
                                    <option value="doxy">Doxycycline (ทางเลือกผู้ใหญ่แพ้ PCN / แผลแมวกัด)</option>
                                    <option value="azithro">Azithromycin (กรณีหญิงตั้งครรภ์/เด็ก แพ้ PCN)</option>
                                  </select>
                                </div>
                                <button 
                                  onClick={calculateATB}
                                  className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl w-full md:w-auto transition-colors"
                                >
                                  คำนวณ Dose
                                </button>
                              </div>

                              {atbResult && (
                                <div className="bg-blue-50 p-5 rounded-2xl shadow-inner border border-blue-200 animate-fade-in">
                                  <h3 className="font-bold text-lg text-gray-800 border-b border-blue-200 pb-2 mb-3 flex items-center justify-between">
                                    Recommendation
                                    <span className={`text-xs px-2 py-1 rounded-full text-white ${atbResult.type === 'pediatric' ? 'bg-orange-400' : 'bg-blue-500'}`}>
                                      {atbResult.type === 'pediatric' ? 'สูตรเด็ก' : 'สูตรผู้ใหญ่'}
                                    </span>
                                  </h3>
                                  <div className="space-y-3">
                                    <div className="flex items-start gap-3">
                                      <Syringe className="w-5 h-5 text-blue-500 mt-0.5" />
                                      <div>
                                        <p className="text-sm text-gray-500">ชื่อยา (Drug)</p>
                                        <p className="font-bold text-blue-900 whitespace-pre-line">{atbResult.drug}</p>
                                      </div>
                                    </div>
                                    <div className="flex items-start gap-3">
                                      <Calculator className="w-5 h-5 text-green-500 mt-0.5" />
                                      <div>
                                        <p className="text-sm text-gray-500">ปริมาณ (Dose)</p>
                                        <p className="font-bold text-2xl text-green-700">{atbResult.dose}</p>
                                        <p className="text-sm text-gray-600 bg-white p-2 rounded-lg mt-1 inline-block whitespace-pre-line shadow-sm border border-gray-100">{atbResult.calcNote}</p>
                                      </div>
                                    </div>
                                    <div className="flex items-start gap-3">
                                      <CalendarDays className="w-5 h-5 text-orange-500 mt-0.5" />
                                      <div>
                                        <p className="text-sm text-gray-500">วิธีทาน (Frequency & Duration)</p>
                                        <p className="font-semibold text-gray-800 whitespace-pre-line">{atbResult.frequency}</p>
                                        <p className="font-semibold text-gray-800">{atbResult.duration}</p>
                                      </div>
                                    </div>
                                  </div>
                                  <div className="mt-4 text-xs text-red-500 flex gap-1 items-start bg-red-50 p-2 rounded border border-red-100">
                                    <AlertCircle className="w-4 h-4 flex-shrink-0 mt-0.5" />
                                    <p>Disclaimer: การคำนวณนี้เป็นเพียง Guideline เบื้องต้น แพทย์ควรเป็นผู้พิจารณาสั่งจ่ายยาและปรับขนาดยาตามความเหมาะสมทางคลินิก</p>
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {/* --- PEDIATRIC VACCINE TAB (PIDST) --- */}
                    {activeTab === 'pediatric' && (
                      <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-gray-800 border-b border-gray-300 pb-2 flex items-center gap-2">
                          <Baby className="w-7 h-7 text-pink-500" /> ตารางวัคซีนเด็กไทย (EPI & PIDST)
                        </h2>
                        <p className="text-sm text-gray-600 mb-4">
                          อ้างอิงตามแผนงานสร้างเสริมภูมิคุ้มกันโรค และสมาคมโรคติดเชื้อในเด็กแห่งประเทศไทย (PIDST)
                        </p>

                        {/* Calculator Section */}
                        <div className="bg-gradient-to-r from-pink-50 to-purple-50 p-6 rounded-3xl border border-pink-100 shadow-sm">
                          <h3 className="font-bold text-pink-800 mb-3 flex items-center gap-2 text-lg">
                            <CalendarDays className="w-5 h-5" /> ค้นหาวัคซีนตามช่วงวัย
                          </h3>
                          <div className="flex flex-col sm:flex-row gap-4 items-end">
                            <div className="w-full sm:w-1/3">
                              <label className="block text-sm font-medium text-gray-700 mb-1">อายุ (ปี)</label>
                              <input 
                                type="number" min="0" max="15"
                                value={childYears} onChange={(e) => setChildYears(e.target.value)} 
                                placeholder="เช่น 1" 
                                className="glass-input w-full p-3 rounded-xl text-lg font-bold text-center"
                              />
                            </div>
                            <div className="w-full sm:w-1/3">
                              <label className="block text-sm font-medium text-gray-700 mb-1">อายุ (เดือน)</label>
                              <input 
                                type="number" min="0" max="11"
                                value={childMonths} onChange={(e) => setChildMonths(e.target.value)} 
                                placeholder="เช่น 6" 
                                className="glass-input w-full p-3 rounded-xl text-lg font-bold text-center"
                              />
                            </div>
                            <button 
                              onClick={calculatePediatricVaccine}
                              className="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-xl w-full sm:w-auto transition-colors shadow-md"
                            >
                              ค้นหาวัคซีน
                            </button>
                          </div>

                          {pediatricResult && (
                            <div className="mt-5 bg-white p-5 rounded-2xl shadow-md border-l-4 border-pink-400 animate-fade-in">
                              <h4 className="text-pink-600 font-bold text-lg mb-1">ช่วงวัย: {pediatricResult.label}</h4>
                              <p className="text-gray-600 text-sm mb-3">{pediatricResult.desc}</p>
                              
                              <div className="bg-pink-50/50 p-4 rounded-xl border border-pink-100">
                                <strong className="text-gray-800 block mb-2">รายการวัคซีนที่ควรได้รับ (แนะนำ):</strong>
                                <ul className="space-y-2">
                                  {pediatricResult.vaccines.map((vac, idx) => (
                                    <li key={idx} className="flex items-start gap-2 text-gray-700 font-medium text-sm">
                                      <Syringe className="w-4 h-4 text-pink-400 mt-0.5 flex-shrink-0" />
                                      {vac}
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            </div>
                          )}
                        </div>

                        {/* Full Schedule Table with Interactive Tooltips */}
                        <div className="mt-8 bg-white rounded-3xl border border-gray-200 shadow-sm">
                          <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 rounded-t-3xl">
                            <h3 className="font-bold text-gray-800 text-lg flex items-center gap-2">
                              <Activity className="w-5 h-5 text-blue-500" /> ตารางภาพรวมการให้วัคซีน
                            </h3>
                          </div>
                          <div className="p-1">
                            <table className="w-full text-left text-sm text-gray-600">
                              <thead className="bg-gray-100/50 text-gray-700">
                                <tr>
                                  <th className="px-6 py-3 font-semibold border-b">อายุ (Age)</th>
                                  <th className="px-6 py-3 font-semibold border-b">วัคซีนพื้นฐาน (EPI) + วัคซีนเสริมที่แนะนำ</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-100">
                                {pediatricScheduleData.map((item, index) => {
                                  const isTopRows = index < 2; // Make tooltip point downwards for first two rows to avoid clipping at top
                                  return (
                                    <tr key={index} className="hover:bg-pink-50/30 transition-colors">
                                      <td className="px-6 py-4 font-bold text-gray-800 whitespace-nowrap bg-gray-50/30">
                                        {item.label}
                                      </td>
                                      <td className="px-6 py-4">
                                        <div className="flex flex-wrap gap-2 relative">
                                          {item.vaccines.map((v, i) => {
                                            const info = getVaccineInfo(v);
                                            return (
                                              <div key={i} className="group relative inline-block cursor-help">
                                                <span className={`inline-block px-2.5 py-1.5 rounded-lg text-xs font-semibold shadow-sm transition-all group-hover:ring-2 ${v.includes('ทางเลือก') || v.includes('เสริม') ? 'bg-purple-100 text-purple-700 border border-purple-200 group-hover:ring-purple-300' : 'bg-blue-100 text-blue-700 border border-blue-200 group-hover:ring-blue-300'}`}>
                                                  {v}
                                                </span>
                                                
                                                {/* Interactive Tooltip Card */}
                                                <div className={`invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-300 absolute z-50 left-1/2 transform -translate-x-1/2 w-72 bg-white rounded-xl shadow-xl border border-gray-200 p-4 pointer-events-none
                                                  ${isTopRows ? 'top-full mt-2' : 'bottom-full mb-2'}`}>
                                                  
                                                  {/* Tooltip Arrow */}
                                                  <div className={`absolute left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white border-gray-200 rotate-45
                                                    ${isTopRows ? '-top-2 border-t border-l' : '-bottom-2 border-b border-r'}`}>
                                                  </div>
                                                  
                                                  <h5 className="font-bold text-gray-800 mb-2 border-b pb-1.5 text-sm leading-tight">{v}</h5>
                                                  <div className="space-y-2.5 text-left">
                                                    <div>
                                                      <span className="flex items-center gap-1 text-xs font-bold text-red-500 mb-1">
                                                        <AlertTriangle className="w-3.5 h-3.5" /> อาการข้างเคียง:
                                                      </span>
                                                      <p className="text-xs text-gray-600 leading-relaxed">{info.se}</p>
                                                    </div>
                                                    <div>
                                                      <span className="flex items-center gap-1 text-xs font-bold text-green-600 mb-1">
                                                        <Lightbulb className="w-3.5 h-3.5" /> คำแนะนำ:
                                                      </span>
                                                      <p className="text-xs text-gray-600 leading-relaxed">{info.advice}</p>
                                                    </div>
                                                  </div>
                                                </div>
                                              </div>
                                            );
                                          })}
                                        </div>
                                        <p className="text-xs text-gray-500 mt-2">{item.desc}</p>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>

                      </div>
                    )}

                    {/* --- GLOBALLY RENDERED REFERENCE SECTION --- */}
                    <ReferenceSection activeTab={activeTab} />

                  </div>
                </div>
              </main>
              </div> {/* End Main App Wrapper */}

              {/* --- HIDDEN PRINT AREA --- */}
              <div id="print-area-container" className={`${isDownloading ? 'block bg-white mx-auto' : 'hidden print:block'} w-[210mm]`}>
                 {pagesToPrint.map((type, index) => (
                    <div key={type} className="print-page-wrapper">
                       {renderPrintPage(type)}
                       {index < pagesToPrint.length - 1 && <div className="html2pdf__page-break"></div>}
                    </div>
                 ))}
              </div>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
